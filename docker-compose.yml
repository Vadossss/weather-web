version: "3.9"

services:
  api:
    build: ./weather-backend
    container_name: weather-api
    restart: always
    expose:
      - "8000"

  frontend:
    build: ./weather-frontend
    container_name: weather-frontend
    restart: always
    ports:
      - "80"

  nginx:
    image: nginx:1.28.0-alpine
    container_name: reverse-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend
